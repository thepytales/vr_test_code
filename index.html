<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inklusives Klassenzimmer VR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <a-scene id="scene" background="color: #87CEEB" proximity-sensor shadow="type: pcfsoft">
        
        <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
        <a-light type="directional" position="2 4 3" castShadow="true" intensity="0.6" shadow-camera-top="10" shadow-camera-bottom="-10" shadow-camera-left="-10" shadow-camera-right="10" shadow-mapSize="1024 1024"></a-light>

        <a-entity id="player-rig" position="3 0 3" joystick-movement>
            
            <a-camera id="player-camera" position="0 1.6 0">
                <a-text id="warning-text" value="Achtung: Weg zu eng!" visible="false" position="0 -0.2 -1" color="red" align="center" scale="0.4 0.4 0.4" font="mozillavr"></a-text>
                
                <a-entity id="wheelchair-mesh" visible="false" position="0 -1.1 0">
                    <a-torus position="-0.35 0.3 -0.1" radius="0.3" radius-tubular="0.015" rotation="0 90 0" color="#111111"></a-torus>
                    <a-torus position="0.35 0.3 -0.1" radius="0.3" radius-tubular="0.015" rotation="0 90 0" color="#111111"></a-torus>
                    <a-torus position="-0.38 0.3 -0.1" radius="0.27" radius-tubular="0.005" rotation="0 90 0" color="#CCCCCC"></a-torus>
                    <a-torus position="0.38 0.3 -0.1" radius="0.27" radius-tubular="0.005" rotation="0 90 0" color="#CCCCCC"></a-torus>
                    <a-cylinder position="-0.25 0.1 0.4" radius="0.08" height="0.04" rotation="0 0 90" color="#222222"></a-cylinder>
                    <a-cylinder position="0.25 0.1 0.4" radius="0.08" height="0.04" rotation="0 0 90" color="#222222"></a-cylinder>
                    <a-box position="0 0.45 0.1" width="0.5" height="0.05" depth="0.5" color="#1A1A1A"></a-box>
                    <a-box position="0 0.7 -0.15" width="0.5" height="0.5" depth="0.05" color="#1A1A1A"></a-box>
                    <a-cylinder position="-0.25 0.25 0.4" radius="0.015" height="0.3" color="#444444"></a-cylinder>
                    <a-cylinder position="0.25 0.25 0.4" radius="0.015" height="0.3" color="#444444"></a-cylinder>
                    <a-cylinder position="-0.25 0.25 -0.1" radius="0.015" height="0.5" color="#444444"></a-cylinder>
                    <a-cylinder position="0.25 0.25 -0.1" radius="0.015" height="0.5" color="#444444"></a-cylinder>
                    <a-box position="-0.28 0.65 0.1" width="0.04" height="0.02" depth="0.35" color="#111111"></a-box>
                    <a-box position="0.28 0.65 0.1" width="0.04" height="0.02" depth="0.35" color="#111111"></a-box>
                    <a-box position="-0.15 0.15 0.45" width="0.15" height="0.02" depth="0.1" color="#111111" rotation="15 0 0"></a-box>
                    <a-box position="0.15 0.15 0.45" width="0.15" height="0.02" depth="0.1" color="#111111" rotation="15 0 0"></a-box>
                    <a-cylinder position="-0.25 0.95 -0.2" radius="0.015" height="0.1" rotation="90 0 0" color="#111111"></a-cylinder>
                    <a-cylinder position="0.25 0.95 -0.2" radius="0.015" height="0.1" rotation="90 0 0" color="#111111"></a-cylinder>
                </a-entity>
            </a-camera>

            <a-entity id="left-controller" laser-controls="hand: left" raycaster="objects: .movable" vr-controller></a-entity>
            <a-entity id="right-controller" laser-controls="hand: right" raycaster="objects: .movable" vr-controller></a-entity>
            
        </a-entity>

        <a-plane position="0 0 0" rotation="-90 0 0" width="12" height="12" color="#A9B0B3" shadow="receive: true"></a-plane>
        <a-plane position="0 4 0" rotation="90 0 0" width="12" height="12" color="#FAFAFA"></a-plane>
        
        <a-box position="0 2 -6" width="12" height="4" depth="0.2" color="#F5F5DC" shadow="receive: true"></a-box>
        <a-box position="0 2 6" width="12" height="4" depth="0.2" color="#F5F5DC" shadow="receive: true"></a-box>
        <a-box position="-6 2 0" width="0.2" height="4" depth="12" color="#F5F5DC" shadow="receive: true"></a-box>
        <a-box position="6 2 0" width="0.2" height="4" depth="12" color="#F5F5DC" shadow="receive: true"></a-box>

        <a-box position="0 2 -5.89" width="4" height="1.5" depth="0.05" color="#2E4A35" shadow="cast: true"></a-box>
        <a-box position="0 1.2 -5.85" width="4.2" height="0.05" depth="0.15" color="#8b5a2b" shadow="cast: true"></a-box>

        <a-box position="5.89 1.4 -4" width="0.05" height="2.8" depth="1.2" color="#5C4033" shadow="cast: true"></a-box>
        <a-sphere position="5.8 1.4 -4.4" radius="0.05" color="#DAA520"></a-sphere>

        <a-plane position="-5.89 2 0" rotation="0 90 0" width="6" height="1.8" color="#ADD8E6" opacity="0.4"></a-plane>
        <a-box position="-5.89 2 -3" width="0.05" height="1.8" depth="0.1" color="#FFFFFF"></a-box>
        <a-box position="-5.89 2 0" width="0.05" height="1.8" depth="0.1" color="#FFFFFF"></a-box>
        <a-box position="-5.89 2 3" width="0.05" height="1.8" depth="0.1" color="#FFFFFF"></a-box>

        <a-plane position="3 0.01 3" rotation="-90 0 0" width="2" height="2" color="#00ff00" opacity="0.3"></a-plane>
        <a-plane position="-3 0.01 -3" rotation="-90 0 0" width="2" height="2" color="#0000ff" opacity="0.3"></a-plane>

        <a-entity class="collidable" position="0 0 -4.5">
            <a-box position="0 0.9 0" width="2" height="0.1" depth="1" color="#8b5a2b" shadow="cast: true; receive: true"></a-box>
            <a-box position="-0.9 0.4 0" width="0.1" height="0.9" depth="0.9" color="#555555" shadow="cast: true"></a-box>
            <a-box position="0.9 0.4 0" width="0.1" height="0.9" depth="0.9" color="#555555" shadow="cast: true"></a-box>
            <a-box position="0 0.4 -0.4" width="1.8" height="0.9" depth="0.1" color="#555555" shadow="cast: true"></a-box>
        </a-entity>

        <a-entity class="movable collidable" position="-1.5 0 -1" rotation="0 15 0">
            <a-box position="0 0.8 0" width="1.5" height="0.05" depth="0.8" color="#D2B48C" shadow="cast: true; receive: true"></a-box>
            <a-cylinder position="-0.7 0.4 -0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.7 0.4 -0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.7 0.4 0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.7 0.4 0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
        </a-entity>

        <a-entity class="movable collidable" position="1.5 0 -0.5" rotation="0 -10 0">
            <a-box position="0 0.8 0" width="1.5" height="0.05" depth="0.8" color="#D2B48C" shadow="cast: true; receive: true"></a-box>
            <a-cylinder position="-0.7 0.4 -0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.7 0.4 -0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.7 0.4 0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.7 0.4 0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
        </a-entity>

        <a-entity class="movable collidable" position="0.5 0 2" rotation="0 45 0">
            <a-box position="0 0.8 0" width="1.5" height="0.05" depth="0.8" color="#D2B48C" shadow="cast: true; receive: true"></a-box>
            <a-cylinder position="-0.7 0.4 -0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.7 0.4 -0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.7 0.4 0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.7 0.4 0.35" radius="0.03" height="0.8" color="#333333" shadow="cast: true"></a-cylinder>
        </a-entity>

        <a-entity class="movable collidable" position="-1.5 0 -0.2" rotation="0 180 0">
            <a-box position="0 0.45 0" width="0.4" height="0.05" depth="0.4" color="#D2B48C" shadow="cast: true; receive: true"></a-box>
            <a-cylinder position="-0.18 0.22 -0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.18 0.22 -0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.18 0.22 0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.18 0.22 0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.15 0.7 0.18" radius="0.015" height="0.5" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.15 0.7 0.18" radius="0.015" height="0.5" color="#222222" shadow="cast: true"></a-cylinder>
            <a-box position="0 0.85 0.18" width="0.4" height="0.2" depth="0.02" color="#D2B48C" shadow="cast: true"></a-box>
        </a-entity>

        <a-entity class="movable collidable" position="1.2 0 0.3" rotation="0 160 0">
            <a-box position="0 0.45 0" width="0.4" height="0.05" depth="0.4" color="#D2B48C" shadow="cast: true; receive: true"></a-box>
            <a-cylinder position="-0.18 0.22 -0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.18 0.22 -0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.18 0.22 0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.18 0.22 0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.15 0.7 0.18" radius="0.015" height="0.5" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.15 0.7 0.18" radius="0.015" height="0.5" color="#222222" shadow="cast: true"></a-cylinder>
            <a-box position="0 0.85 0.18" width="0.4" height="0.2" depth="0.02" color="#D2B48C" shadow="cast: true"></a-box>
        </a-entity>

        <a-entity class="movable collidable" position="0.5 0 1.2" rotation="0 40 0">
            <a-box position="0 0.45 0" width="0.4" height="0.05" depth="0.4" color="#D2B48C" shadow="cast: true; receive: true"></a-box>
            <a-cylinder position="-0.18 0.22 -0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.18 0.22 -0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.18 0.22 0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.18 0.22 0.18" radius="0.02" height="0.45" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="-0.15 0.7 0.18" radius="0.015" height="0.5" color="#222222" shadow="cast: true"></a-cylinder>
            <a-cylinder position="0.15 0.7 0.18" radius="0.015" height="0.5" color="#222222" shadow="cast: true"></a-cylinder>
            <a-box position="0 0.85 0.18" width="0.4" height="0.2" depth="0.02" color="#D2B48C" shadow="cast: true"></a-box>
        </a-entity>

    </a-scene>
</body>
</html>
